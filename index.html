<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Đua Vịt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🦆 GAME ĐUA VỊT 🦆</h1>
    <p class="subtitle">Chọn vịt rồi bấm bắt đầu để xem ai thắng</p>

    <div class="control-panel">
      <label for="bet">Chọn vịt bạn cược:</label>
      <select id="bet">
        <option value="0">Vịt 1</option>
        <option value="1">Vịt 2</option>
        <option value="2">Vịt 3</option>
        <option value="3">Vịt 4</option>
      </select>

      <button id="startBtn">Bắt đầu đua</button>
      <button id="resetBtn">Chơi lại</button>
    </div>

    <div class="status-box">
      <p id="status">Nhấn "Bắt đầu đua" để chơi.</p>
    </div>

    <div class="track" id="track">
      <div class="finish-line"></div>

      <div class="lane">
        <div class="lane-label">Vịt 1</div>
        <div class="duck" id="duck0">🦆</div>
      </div>

      <div class="lane">
        <div class="lane-label">Vịt 2</div>
        <div class="duck" id="duck1">🐤</div>
      </div>

      <div class="lane">
        <div class="lane-label">Vịt 3</div>
        <div class="duck" id="duck2">🦆</div>
      </div>

      <div class="lane">
        <div class="lane-label">Vịt 4</div>
        <div class="duck" id="duck3">🐥</div>
      </div>
    </div>

    <div class="result-box">
      <h2>Bảng kết quả</h2>
      <ol id="rankingList">
        <li>Chưa có kết quả</li>
      </ol>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
